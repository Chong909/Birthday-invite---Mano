<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma's 90th Birthday Invitation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;700&family=Pinyon+Script&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      /* Background setup using your image */
      background: url('1000342873.jpg') no-repeat center top;
      background-size: cover;
      background-attachment: scroll;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: #4a122c; /* Deep burgundy text to match the flowers and contrast with white background */
      padding: 20px;
    }

    .invitation-container {
      max-width: 500px;
      width: 100%;
      margin: 120px auto 100px auto; /* Adds breathing room for the top and bottom floral borders */
      padding: 20px;
      text-align: center;
    }

    /* Gold text gradient styling */
    .gold-text {
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .join-us {
      font-family: 'Cinzel', serif !important;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Cinzel', serif !important;
      font-weight: 600 !important;
      color: #4a122c !important;
      font-size: 2.2rem;
      line-height: 1.3;
      margin: 0 0 15px 0;
      letter-spacing: 1px;
    }

    .celebrating {
      font-family: 'Montserrat', sans-serif !important;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 5px;
      color: #7a2846 !important;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .guest-of-honor {
      font-family: 'Pinyon Script', cursive !important;
      font-size: 5rem;
      margin: 10px 0;
      line-height: 0.9;
      padding-bottom: 10px;
    }

    /* Event Details Box */
    .details-section {
      margin: 25px 0;
      background: rgba(74, 18, 44, 0.05) !important;
      padding: 20px 15px;
      border-radius: 12px;
      border: 1px solid rgba(74, 18, 44, 0.15);
    }

    .details-item {
      margin: 10px 0;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4a122c !important;
    }

    .details-item strong {
      font-weight: 700;
      color: #4a122c !important;
    }

    /* RSVP Container Box */
    .rsvp-form-box {
      margin-top: 25px;
      padding: 25px 20px;
      border-radius: 16px;
      background: #ffffff !important;
      border: 1px solid rgba(74, 18, 44, 0.2) !important;
      text-align: left;
      box-shadow: 0 8px 24px rgba(74, 18, 44, 0.08);
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4a122c !important;
    }

    .status-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .status-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px solid rgba(74, 18, 44, 0.3) !important;
      border-radius: 8px;
      background: #ffffff !important;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      text-align: center;
    }

    .status-btn.yes {
      color: #008a36 !important;
    }

    .status-btn.yes.active {
      background: #00cc52 !important;
      color: #ffffff !important;
      border-color: #00cc52 !important;
    }

    .status-btn.no {
      color: #b81d24 !important;
    }

    .status-btn.no.active {
      background: #ff2e35 !important;
      color: #ffffff !important;
      border-color: #ff2e35 !important;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(74, 18, 44, 0.3) !important;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      background: #ffffff !important;
      color: #4a122c !important;
    }

    .submit-btn {
      width: 100%;
      background: #4a122c !important;
      border: none !important;
      color: #ffffff !important;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #63193b !important;
    }

    .footer-contact {
      margin-top: 35px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4a122c !important;
      line-height: 1.6;
    }

    @media (max-width: 500px) {
      .invitation-container {
        margin: 80px auto 60px auto;
      }
      h1 {
        font-size: 1.9rem;
      }
      .guest-of-honor {
        font-size: 4.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="invitation-container">
    
    <div class="join-us gold-text">90 YEARS LOVED</div>
    <h1>Please join us to celebrate Ma</h1>
    <div class="celebrating">on her </div>
    <div class="guest-of-honor gold-text">90th birthday</div>

    <div class="details-section">
      <div class="details-item"><strong>Venue:</strong> Durban</div>
      <div class="details-item"><strong>Date:</strong> 19th December 2026</div>
      <div class="details-item"><strong>Time:</strong> 15h00</div>
    </div>

    <div class="rsvp-form-box">
      <form onsubmit="sendToWhatsApp(event)">
        
        <label>Will you attend?</label>
        <div class="status-buttons">
          <button type="button" class="status-btn yes" onclick="setAttendance('Yes')">✓ Attend</button>
          <button type="button" class="status-btn no" onclick="setAttendance('No')">✗ Decline</button>
        </div>
        <input type="hidden" id="attendance-value" required>

        <label for="name">Your Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="attendees">Number of Attendees</label>
        <select id="attendees">
          <option value="1">1 Person</option>
          <option value="2">2 People</option>
          <option value="3">3 People</option>
          <option value="4">4 People</option>
          <option value="5">5 People</option>
          <option value="6">6 People</option>
          <option value="7+">7+ People</option>
        </select>

        <button type="submit" class="submit-btn">Submit RSVP via WhatsApp</button>
      </form>
    </div>

    <div class="footer-contact">
      RSVP: Joanna Govender<br>084 300 7610
    </div>

  </div>

  <script>
    function setAttendance(choice) {
      document.getElementById('attendance-value').value = choice;
      
      const yesBtn = document.querySelector('.status-btn.yes');
      const noBtn = document.querySelector('.status-btn.no');
      
      if (choice === 'Yes') {
        yesBtn.classList.add('active');
        noBtn.classList.remove('active');
      } else {
        noBtn.classList.add('active');
        yesBtn.classList.remove('active');
      }
    }

    function sendToWhatsApp(event) {
      event.preventDefault(); 
      const myPhoneNumber = "27843007610"; 
      const attendance = document.getElementById('attendance-value').value;
      const guestName = document.getElementById('name').value;
      const guestCount = document.getElementById('attendees').value;

      if (!attendance) {
        alert("Please select if you will be attending or not!");
        return;
      }

      let message = `*🎉 Birthday RSVP Update 🎉*\n\n`;
      message += `*Name:* ${guestName}\n`;
      message += `*Attendance:* ${attendance}\n`;
      
      if (attendance === 'Yes') {
        message += `*Total Guests Coming:* ${guestCount}\n`;
      }

      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://api.whatsapp.com/send?phone=${myPhoneNumber}&text=${encodedMessage}`;
      window.open(whatsappURL, '_blank');
    }
  </script>
</body>
</html>
