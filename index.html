<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mano's 90th Birthday Invitation</title>
  <style>
    /* Importing fonts to match the reference style precisely */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Pinyon+Script&family=Montserrat:wght@300;400;500;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      /* Updated with your new glitter background filename */
      background: url('1781173637783.png') no-repeat center top;
      background-size: cover;
      background-attachment: scroll;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* Outer container mimicking the clean layout of the reference card image */
    .invitation-container {
      max-width: 550px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 25px 40px 25px;
      text-align: center;
      position: relative;
    }

    .portrait-box {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 85px;
      height: 85px;
      border-radius: 50%;
      border: 1.5px solid #ffffff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .portrait-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .join-us {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 4px;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      color: #ffffff;
      font-size: 2.8rem;
      line-height: 1.2;
      margin: 0 0 40px 0;
      letter-spacing: 2px;
    }

    .celebrating {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 5px;
      color: #4a122c;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .guest-of-honor {
      font-family: 'Pinyon Script', cursive;
      font-size: 3.8rem;
      color: #4a122c;
      margin: 0px 0 5px 0;
      line-height: 1;
    }

    .age-milestone {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 4px;
      color: #4a122c;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .details-section {
      font-family: 'Montserrat', sans-serif;
      margin: 30px 0;
    }

    .details-item {
      margin: 12px 0;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4a122c;
    }

    .details-item strong {
      font-weight: 700;
    }

    /* RSVP Section customized to blend cleanly directly into the background colors */
    .rsvp-form-box {
      margin-top: 40px;
      padding: 25px 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: left;
      box-shadow: 0 8px 20px rgba(74, 18, 44, 0.08);
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4a122c;
    }

    .status-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .status-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(74, 18, 44, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      text-align: center;
    }

    .status-btn.yes {
      color: #008a36;
    }

    .status-btn.yes.active {
      background: #00cc52;
      color: white;
      border-color: #00cc52;
      box-shadow: 0 4px 12px rgba(0,204,82,0.3);
    }

    .status-btn.no {
      color: #b81d24;
    }

    .status-btn.no.active {
      background: #ff2e35;
      color: white;
      border-color: #ff2e35;
      box-shadow: 0 4px 12px rgba(255,46,53,0.3);
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(74, 18, 44, 0.2);
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.85);
      color: #4a122c;
    }

    .submit-btn {
      width: 100%;
      background: #4a122c;
      border: none;
      color: #ffffff;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 12px rgba(74, 18, 44, 0.2);
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #63193b;
      transform: translateY(-1px);
    }

    .footer-contact {
      margin-top: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4a122c;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2.3rem;
      }
      .guest-of-honor {
        font-size: 3.2rem;
      }
      .portrait-box {
        position: relative;
        top: 0;
        right: 0;
        margin: 0 auto 20px auto;
      }
    }
  </style>
</head>
<body>

  <div class="invitation-container">
    
    <div class="portrait-box">
      <img src="IMG-20260611-WA0019.jpg" alt="Manormoney Munsamy">
    </div>

    <div class="join-us">Join us for a</div>
    <h1>BIRTHDAY<br>PARTY</h1>
    
    <div class="celebrating">Celebrating</div>
    <div class="guest-of-honor">Manormoney Munsamy</div>
    <div class="age-milestone">As she turns ninety</div>

    <div class="details-section">
      <div class="details-item"><strong>Venue:</strong> Marigod Banquet Hall, Merebank</div>
      <div class="details-item"><strong>Date:</strong> 19th December</div>
      <div class="details-item"><strong>Time:</strong> 15h00</div>
    </div>

    <div class="rsvp-form-box">
      <form onsubmit="sendToWhatsApp(event)">
        
        <label>Will you attend?</label>
        <div class="status-buttons">
          <button type="button" class="status-btn yes" onclick="setAttendance('Yes')">✓ Attend</button>
          <button type="button" class="status-btn no" onclick="setAttendance('No')">✗ Decline</button>
        </div>

        <input type="hidden" id="attendance-value" required>

        <label for="name">Your Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="attendees">Number of Attendees</label>
        <select id="attendees">
          <option value="1">1 Person</option>
          <option value="2">2 People</option>
          <option value="3">3 People</option>
          <option value="4">4 People</option>
          <option value="5+">5+ People</option>
        </select>

        <button type="submit" class="submit-btn">Submit RSVP via WhatsApp</button>
      </form>
    </div>

    <div class="footer-contact">
      RSVP: Joanna Govender 084 300 7610
    </div>

  </div>

  <script>
    function setAttendance(choice) {
      document.getElementById('attendance-value').value = choice;
      
      const yesBtn = document.querySelector('.status-btn.yes');
      const noBtn = document.querySelector('.status-btn.no');
      
      if (choice === 'Yes') {
        yesBtn.classList.add('active');
        noBtn.classList.remove('active');
      } else {
        noBtn.classList.add('active');
        yesBtn.classList.remove('active');
      }
    }

    function sendToWhatsApp(event) {
      event.preventDefault(); 

      const myPhoneNumber = "27843007610"; 

      const attendance = document.getElementById('attendance-value').value;
      const guestName = document.getElementById('name').value;
      const guestCount = document.getElementById('attendees').value;

      if (!attendance) {
        alert("Please select if you will be attending or not!");
        return;
      }

      let message = `*🎉 Birthday RSVP Update 🎉*\n\n`;
      message += `*Name:* ${guestName}\n`;
      message += `*Attending:* ${attendance}\n`;
      
      if (attendance === 'Yes') {
        message += `*Total Guests Coming:* ${guestCount}\n`;
      }

      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://api.whatsapp.com/send?phone=${myPhoneNumber}&text=${encodedMessage}`;

      window.open(whatsappURL, '_blank');
    }
  </script>

</body>
</html>
